# =============================================================================
# Squid forward proxy — domain allowlist for the windows-ai-sandbox profile
# =============================================================================
# Only allows HTTPS CONNECT to domains listed in allowed_domains.txt.
# Everything else is denied. sandbox-internal (internal: true) is the
# load-bearing egress cutoff — this proxy is the only way out.
# =============================================================================

http_port 3128

# Disable the ICMP pinger — it needs CAP_NET_RAW which we don't grant,
# and we have no cache peers.
pinger_enable off

acl allowed_domains dstdomain "/etc/squid/allowed_domains.txt"

# Port-restrict non-CONNECT methods too. Without this, `http_access allow
# allowed_domains` below would forward GET/POST to arbitrary ports on any
# allowlisted host — e.g. GET http://api.anthropic.com:22/ would be handed
# off to Squid's upstream connect. Restricting to the ports that actually
# serve HTTP (80/443) closes that hole. CONNECT is separately gated to 443
# via SSL_ports.
acl Safe_ports port 80 443
http_access deny !Safe_ports

acl SSL_ports port 443
acl CONNECT method CONNECT
http_access allow CONNECT SSL_ports allowed_domains
http_access allow allowed_domains
http_access deny all

# Keep an audit trail of what the agent actually reached. File sits on the
# tmpfs mounted by compose at /var/log/squid (root:proxy 0775 — see
# docker-compose.yml). Squid creates access.log as proxy:proxy 0640, so
# read it as the proxy user. tmpfs-backed: logs survive only until the
# proxy container recreates — intended for in-session forensics, not
# long-term storage. Tail from host:
#   docker exec -u proxy egress-proxy-<profile> tail -f /var/log/squid/access.log
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log
cache deny all

connect_timeout 30 seconds
read_timeout 120 seconds
request_timeout 120 seconds

via on
forwarded_for delete
