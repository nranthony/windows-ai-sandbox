# =============================================================================
# windows-ai-sandbox — multi-profile CUDA + Claude Code stack (hardened)
# =============================================================================
# Parameterized by PROFILE. Drive via scripts/profile.sh, which exports PROFILE
# and COMPOSE_PROJECT_NAME=ai-sandbox-<profile>. Each profile gets its own
# containers, compose-managed networks, and state dir — concurrent profiles
# do not share any of these.
#
# Network model (load-bearing — see sandbox-hardening-package.md §4):
#   sandbox-internal (internal: true)  — agent-only; no direct internet
#   sandbox-external                   — Squid proxy's outbound side
# The proxy is the ONLY way out. Allowlist: proxy/allowed_domains.txt
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # CUDA + Claude Code agent container — one per profile
  # ---------------------------------------------------------------------------
  ai-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    image: windows-ai-sandbox:latest
    container_name: ai-sandbox-${PROFILE:?PROFILE env var required — use scripts/profile.sh}
    hostname: ai-sandbox-${PROFILE}

    # GPU passthrough — WSL2-native /dev/dxg, not --gpus all (broken under rootless + toolkit >=1.18).
    devices:
      - /dev/dxg

    # Hardening — non-negotiable per audit §4.
    security_opt:
      - no-new-privileges:true
      - seccomp=./seccomp.json
    cap_drop:
      - ALL
    pids_limit: 512
    mem_limit: 8g
    memswap_limit: 8g
    cpus: 4
    ulimits:
      nofile:
        soft: 2048
        hard: 8192

    # tmpfs for scratch + npm/local under /root (container root = host UID 1000
    # via rootless Docker userns=host). noexec explicit per audit Finding G.
    tmpfs:
      - /tmp:size=1g,noexec,nosuid,nodev
      - /run:size=64m,noexec,nosuid,nodev
      - /root/.npm-global:size=512m,noexec,nosuid,nodev
      - /root/.local:size=256m,noexec,nosuid,nodev

    volumes:
      # The profile's repo parent folder = /workspace. Holds many repos.
      - ${HOME}/repo/${PROFILE}:/workspace:rw

      # WSL2 driver libs (paired with LD_LIBRARY_PATH below).
      - /usr/lib/wsl:/usr/lib/wsl:ro

      # Per-profile persistent state (auth, config, caches) — outlives recreates.
      - ${HOME}/.ai-sandbox/profiles/${PROFILE}/claude-home:/root/.claude:rw
      - ${HOME}/.ai-sandbox/profiles/${PROFILE}/claude.json:/root/.claude.json:rw
      - ${HOME}/.ai-sandbox/profiles/${PROFILE}/cache:/root/.cache:rw
      # .config mounted as a directory (not per-file) — git's atomic rename()
      # during `git config --global set` fails with EBUSY across single-file
      # bind mounts. Directory mounts avoid that.
      - ${HOME}/.ai-sandbox/profiles/${PROFILE}/config:/root/.config:rw
      # Per-profile Antigravity CLI (agy) state — agy reuses the ~/.gemini home
      # (config/keybindings/cache under /root/.gemini/antigravity-cli/). Host dir
      # is still named gemini-home (former Gemini CLI mount; kept to avoid churn).
      # The auth token is NOT persisted here — re-auth at the console per rebuild.
      - ${HOME}/.ai-sandbox/profiles/${PROFILE}/gemini-home:/root/.gemini:rw

    environment:
      - LD_LIBRARY_PATH=/usr/lib/wsl/lib
      - GIT_CONFIG_GLOBAL=/root/.config/git/config
      - SANDBOX_PROFILE=${PROFILE}
      # All outbound HTTP(S) is forced through the Squid sidecar.
      - HTTP_PROXY=http://egress-proxy:3128
      - HTTPS_PROXY=http://egress-proxy:3128
      - http_proxy=http://egress-proxy:3128
      - https_proxy=http://egress-proxy:3128
      - NO_PROXY=localhost,127.0.0.1,egress-proxy

    networks:
      sandbox-internal:
    # DNS lockdown (closes the DNS-exfil side channel that internal:true does
    # NOT close on its own). Docker's embedded resolver at 127.0.0.11 forwards
    # queries to the host's resolver, which can reach the internet — an agent
    # could exfil data in crafted subdomain queries (e.g. secret.evil.com).
    # Sinkholing to 127.0.0.1 makes all DNS lookups fail, then extra_hosts
    # below provides the handful of names the agent legitimately needs. This
    # pair — sinkhole + static hosts — is tighter than relying on the proxy
    # alone, because DNS exfil bypasses HTTP-level controls entirely.
    dns:
      - 127.0.0.1
    extra_hosts:
      - "egress-proxy:172.30.${SANDBOX_OCTET:-0}.10"
      - "postgres:172.30.${SANDBOX_OCTET:-0}.20"
      - "mongo:172.30.${SANDBOX_OCTET:-0}.30"
    env_file:
      # Optional DB creds — only present for profiles that opted into the
      # postgres/mongo sibling containers. required: false so profiles
      # without DBs still come up cleanly.
      - path: ${HOME}/.ai-sandbox/profiles/${PROFILE}/db.env
        required: false

    depends_on:
      - egress-proxy

    working_dir: /workspace
    command: ["sleep", "infinity"]
    restart: "no"

  # ---------------------------------------------------------------------------
  # Optional: Postgres sibling (opt-in via COMPOSE_PROFILES=db-postgres)
  # ---------------------------------------------------------------------------
  # On sandbox-internal only — the agent reaches it at host `postgres:5432`.
  # Data lives in a named volume (ai-sandbox-<profile>_postgres-data) managed
  # by Docker inside the WSL2 ext4 rootfs. Back up anything important with
  # `pg_dump` to /workspace. Credentials come from
  # profiles/<profile>/db.env (template: config/db.env.template). File is
  # optional — without POSTGRES_PASSWORD the image refuses to start, which is
  # the behavior we want.
  postgres:
    # Pinned by digest (postgres:18 as of 2026-04-24). To refresh:
    #   docker pull postgres:18 && docker image inspect postgres:18 \
    #     --format '{{index .RepoDigests 0}}'
    image: postgres:18@sha256:78481659c47e862334611ccdaf7c369c986b3046da9857112f3b309114a65fb4
    container_name: postgres-${PROFILE}
    hostname: postgres
    profiles: ["db-postgres", "db-all"]
    env_file:
      - path: ${HOME}/.ai-sandbox/profiles/${PROFILE}/db.env
        required: false
    volumes:
      - postgres-data:/var/lib/postgresql:rw
    networks:
      sandbox-internal:
        ipv4_address: 172.30.${SANDBOX_OCTET:-0}.20
    # Uncomment to expose to host GUI tools (DBeaver, psql on WSL host).
    # Loopback-only — do not bind 0.0.0.0.
    # ports:
    #   - "127.0.0.1:5432:5432"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    mem_limit: 2g
    cpus: 2
    restart: "no"

  # ---------------------------------------------------------------------------
  # Optional: MongoDB sibling (opt-in via COMPOSE_PROFILES=db-mongo)
  # ---------------------------------------------------------------------------
  # Reach from the agent at host `mongo:27017`. Named volume for data.
  # If MONGO_INITDB_ROOT_USERNAME/PASSWORD are unset the image starts
  # without auth — acceptable on sandbox-internal (no external reachability),
  # but set them in db.env if you plan to publish the port.
  mongo:
    # Pinned by digest (mongo:8 as of 2026-04-24). To refresh:
    #   docker pull mongo:8 && docker image inspect mongo:8 \
    #     --format '{{index .RepoDigests 0}}'
    image: mongo:8@sha256:7abfba0d07c9330373f8173981ea4d09cd8a82cdf0e86ccaf7008848d1d24f62
    container_name: mongo-${PROFILE}
    hostname: mongo
    profiles: ["db-mongo", "db-all"]
    env_file:
      - path: ${HOME}/.ai-sandbox/profiles/${PROFILE}/db.env
        required: false
    volumes:
      - mongo-data:/data/db:rw
    networks:
      sandbox-internal:
        ipv4_address: 172.30.${SANDBOX_OCTET:-0}.30
    # Uncomment to expose to host GUI tools (Compass, mongosh on WSL host).
    # ports:
    #   - "127.0.0.1:27017:27017"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    mem_limit: 2g
    cpus: 2
    restart: "no"

  # ---------------------------------------------------------------------------
  # Egress proxy — domain-allowlisted outbound traffic
  # ---------------------------------------------------------------------------
  egress-proxy:
    # Pinned by digest — Squid is the single choke-point for all agent egress,
    # so an unvetted tag bump could re-open a bypass. Mirrors the macolima
    # pin (ubuntu/squid:latest as of 2026-04-24). To refresh:
    #   docker pull ubuntu/squid:latest && docker image inspect ubuntu/squid:latest \
    #     --format '{{index .RepoDigests 0}}'
    image: ubuntu/squid:latest@sha256:6a097f68bae708cedbabd6188d68c7e2e7a38cedd05a176e1cc0ba29e3bbe029
    container_name: egress-proxy-${PROFILE}
    hostname: egress-proxy
    read_only: true
    tmpfs:
      # Squid starts as root (writes /run/squid.pid, opens cache.log) then
      # drops to user `proxy` (uid 13, baked into ubuntu/squid image) via
      # cache_effective_user. After drop, Squid opens access.log and writes
      # cache disk. Tmpfs ownership needs to satisfy both phases:
      #   /var/spool/squid  — post-drop only → proxy:proxy
      #   /var/log/squid    — cache.log (root) + access.log (proxy) → root:proxy 0775
      #   /run              — /run/squid.pid written by root → leave default
      - /var/spool/squid:size=256m,uid=13,gid=13,mode=0750
      - /var/log/squid:size=64m,uid=0,gid=13,mode=0775
      - /run:size=8m
    volumes:
      - ./proxy/squid.conf:/etc/squid/squid.conf:ro
      - ./proxy/allowed_domains.txt:/etc/squid/allowed_domains.txt:ro
    # Squid needs SETUID+SETGID at startup to drop from root to the `proxy`
    # user. 3128 is unprivileged, so NET_BIND_SERVICE is NOT needed.
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 0.5
    networks:
      sandbox-internal:
        ipv4_address: 172.30.${SANDBOX_OCTET:-0}.10
      sandbox-external:
    restart: "no"

networks:
  # Agent-only network. internal: true is LOAD-BEARING — removing it turns the
  # proxy into a suggestion (see audit §4).
  sandbox-internal:
    driver: bridge
    internal: true
    # Static subnet so we can pin egress-proxy/postgres/mongo to known IPs
    # and feed them to the agent via extra_hosts. Required to make the
    # dns: [127.0.0.1] sinkhole workable — without static IPs we'd have no
    # reliable way to pre-populate /etc/hosts.
    #
    # The /24's third octet (SANDBOX_OCTET) is allocated per-profile by
    # profile.sh (ensure_subnet_octet) and persisted to
    # ~/.ai-sandbox/profiles/<profile>/subnet-octet, so concurrent profiles
    # land on distinct /24s instead of all fighting over 172.30.0.0/24 (the
    # "Pool overlaps with other one on this address space" error). The same
    # variable drives the subnet AND the .10/.20/.30 pins above, so the two
    # can never drift. Default 0 keeps the legacy subnet for the global
    # `build` (PROFILE=_build, never creates a network) and the
    # network-neutral `restart`/`ps` paths.
    ipam:
      config:
        - subnet: 172.30.${SANDBOX_OCTET:-0}.0/24
  # Proxy's outbound side only.
  sandbox-external:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
